services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-yolo8
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-this-secret-key}
      FLASK_DEBUG: ${FLASK_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/users.db}
      SESSION_TYPE: ${SESSION_TYPE:-filesystem}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET:-my-bucket}
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-uploads}
      RESULT_FOLDER: ${RESULT_FOLDER:-results}
      SAMPLE_FOLDER: ${SAMPLE_FOLDER:-samples}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/results:/app/static/results
      - ./flask_session:/app/flask_session
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
